<style>

  #cmap{height:48vh;min-height:300px;border-radius:12px;border:1px solid var(--line);overflow:hidden;background:#33402f;margin-bottom:12px}

  .hgrid .hbtn .tick{font-size:10px;color:var(--muted)}
  .hgrid .hbtn[data-set=true] .tick{color:var(--gain)}
  .hgrid .hbtn[aria-pressed=true]{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .hgrid .hbtn[aria-pressed=true] .tick{color:var(--gain)}
  .greenmark{background:var(--gain);color:#fff;font-family:'JetBrains Mono';font-weight:700;font-size:12px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)}
  .searchrow{display:flex;gap:8px;margin-bottom:10px}.searchrow input{flex:1}

<body>
<div class="topbar"><div class="row" id="topbar"></div></div>
<div class="wrap" id="app"></div>
<div id="toast"></div>
<input type="file" id="import-file" accept=".json" style="display:none">

<script>
/* ============================================================================
   STROKES-GAINED BASELINES — swappable module
   Expected strokes to hole out. Two benchmarks: PGA Tour and Scratch.
   Yards for tee/fairway/rough/sand/recovery; FEET for green. Linear interp.
   Tour ≈ Broadie "Every Shot Counts" Table 5.2 (approx). Scratch derived from
   tour + research-implied position gaps (small near green, larger long shots).
   Replace either table with exact published values any time.
============================================================================ */
const BENCHMARKS = {
  tour:{
    tee:[[100,2.80],[150,2.92],[200,3.05],[250,3.20],[300,3.45],[340,3.70],[370,3.85],[400,3.99],[440,4.18],[480,4.36],[520,4.55],[540,4.65],[580,4.80],[600,4.90]],
    fairway:[[20,2.40],[40,2.60],[60,2.70],[80,2.75],[100,2.80],[120,2.85],[140,2.91],[160,2.98],[180,3.08],[200,3.19],[220,3.32],[240,3.45],[260,3.55],[280,3.65],[300,3.71],[350,3.87],[400,4.00]],
    rough:[[20,2.59],[40,2.78],[60,2.91],[80,2.99],[100,3.05],[120,3.12],[140,3.20],[160,3.28],[180,3.38],[200,3.49],[220,3.61],[240,3.72],[260,3.82],[280,3.92],[300,4.00],[350,4.16],[400,4.28]],
    sand:[[10,2.43],[20,2.53],[30,2.66],[40,2.82],[50,2.92],[60,3.10],[80,3.21],[100,3.27],[120,3.33],[140,3.40],[160,3.49],[180,3.58],[200,3.68]],
    recovery:[[20,3.20],[40,3.45],[60,3.60],[80,3.72],[100,3.80],[120,3.87],[140,3.95],[160,4.03],[180,4.12],[200,4.21]],
    green:[[1,1.001],[2,1.01],[3,1.05],[4,1.13],[5,1.23],[6,1.34],[7,1.42],[8,1.50],[9,1.56],[10,1.61],[12,1.69],[15,1.78],[18,1.84],[20,1.87],[25,1.93],[30,1.98],[35,2.02],[40,2.06],[50,2.13],[60,2.19],[70,2.25],[90,2.40]]
  },
  scratch:{
    tee:[[100,2.94],[150,3.08],[200,3.22],[250,3.36],[300,3.6],[340,3.83],[370,3.98],[400,4.11],[440,4.3],[480,4.47],[520,4.66],[540,4.76],[580,4.9],[600,5]],
    fairway:[[20,2.46],[40,2.69],[60,2.81],[80,2.88],[100,2.94],[120,3],[140,3.07],[160,3.15],[180,3.25],[200,3.36],[220,3.48],[240,3.61],[260,3.7],[280,3.8],[300,3.85],[350,4],[400,4.12]],
    rough:[[20,2.64],[40,2.85],[60,3],[80,3.09],[100,3.16],[120,3.24],[140,3.33],[160,3.42],[180,3.52],[200,3.63],[220,3.74],[240,3.85],[260,3.94],[280,4.04],[300,4.12],[350,4.27],[400,4.38]],
    sand:[[10,2.46],[20,2.58],[30,2.72],[40,2.89],[50,3],[60,3.19],[80,3.31],[100,3.38],[120,3.45],[140,3.53],[160,3.63],[180,3.72],[200,3.82]],
    recovery:[[20,3.25],[40,3.52],[60,3.69],[80,3.82],[100,3.91],[120,3.99],[140,4.08],[160,4.17],[180,4.26],[200,4.35]],
    green:[[1,1.02],[2,1.03],[3,1.07],[4,1.15],[5,1.25],[6,1.36],[7,1.44],[8,1.52],[9,1.58],[10,1.63],[12,1.71],[15,1.8],[18,1.86],[20,1.89],[25,1.95],[30,2],[35,2.04],[40,2.08],[50,2.15],[60,2.21],[70,2.27],[90,2.42]]
  }
};
const BENCH_LABEL={tour:'Tour',scratch:'Scratch'};
function interp(tbl,x){
  if(x<=tbl[0][0]) return tbl[0][1];
  if(x>=tbl[tbl.length-1][0]) return tbl[tbl.length-1][1];
  for(let i=0;i<tbl.length-1;i++){const [x0,y0]=tbl[i],[x1,y1]=tbl[i+1];
    if(x>=x0&&x<=x1) return y0+(y1-y0)*(x-x0)/(x1-x0);}
  return tbl[tbl.length-1][1];
}
function expected(bm,lie,dist){ if(dist==null||isNaN(dist)) return null; return interp(BENCHMARKS[bm][lie],dist); }

const LIES=['tee','fairway','rough','sand','recovery','green'];
function classify(shot,par){
  if(shot.lie==='green') return 'putt';
  if(shot.dist<=30) return 'arg';
  if(shot.lie==='tee' && par>=4) return 'ott';
  return 'app';
}
const CAT_NAMES={ott:'Off the tee',app:'Approach',arg:'Around the green',putt:'Putting'};
function holeStrokesGained(hole,bm){
  const shots=hole.shots.filter(s=>s.dist!=null && !isNaN(s.dist));
  const out=[];
  for(let i=0;i<shots.length;i++){
    const eStart=expected(bm,shots[i].lie,shots[i].dist);
    const eEnd=(i<shots.length-1)?expected(bm,shots[i+1].lie,shots[i+1].dist):0;
    const pen=shots[i].pen||0;
    out.push({sg:eStart-eEnd-1-pen,cat:classify(shots[i],hole.par),pen});
  }
  return out;
}
function roundTotals(round,bm){
  const cats={ott:0,app:0,arg:0,putt:0}; let total=0;
  round.holes.forEach(h=>holeStrokesGained(h,bm).forEach(s=>{if(s.sg!=null){cats[s.cat]+=s.sg;total+=s.sg;}}));
  return {cats,total};
}

/* Category-handicap mapping (Game profile). Strokes/round lost per handicap
   point vs a SCRATCH baseline, from published per-category benchmarks. Approx. */
const HCP_COEF={ott:0.22,app:0.30,arg:0.15,putt:0.13};
const HCP_TOTAL_COEF=0.80;
function toHcp(sgPerRound,coef){ let h=Math.round(-sgPerRound/coef); return Math.max(-8,Math.min(36,h)); }
function fmtHcp(h){ if(h<=-1) return '+'+Math.abs(h); if(h===0) return '0'; return ''+h; }
function hcpWord(h){ if(h<=-1) return '+'+Math.abs(h)+' handicap'; if(h===0) return 'scratch'; return h+' handicap'; }

/* ============================================================================
   GPS + geometry
============================================================================ */
function haversineMeters(a,b){
  const R=6371000,toRad=d=>d*Math.PI/180;
  const dLat=toRad(b.lat-a.lat),dLng=toRad(b.lng-a.lng);
  const s=Math.sin(dLat/2)**2+Math.cos(toRad(a.lat))*Math.cos(toRad(b.lat))*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}
const GPS_OK=('geolocation' in navigator);
function getPosition(){return new Promise((res,rej)=>{
  if(!GPS_OK) return rej(new Error('no-gps'));
  navigator.geolocation.getCurrentPosition(
    p=>res({lat:p.coords.latitude,lng:p.coords.longitude,acc:p.coords.accuracy}),
    e=>rej(e),{enableHighAccuracy:true,timeout:10000,maximumAge:0});
});}
function gpsErr(e){
  if(e&&e.code===1) return 'Location permission denied. Allow it on an https page.';
  if(e&&e.code===2) return 'Position unavailable — try again in the open.';
  if(e&&e.code===3) return 'GPS timed out — try again.';
  return 'GPS needs an https page + permission (the in-chat preview blocks it).';
}

/* ============================================================================
   STORAGE
============================================================================ */
const hasWS=(typeof window!=='undefined'&&window.storage&&typeof window.storage.get==='function');
const Store={
  async get(k){try{if(hasWS){const r=await window.storage.get(k,false);return r?r.value:null;}return localStorage.getItem(k);}catch(e){return null;}},
  async set(k,v){try{if(hasWS){await window.storage.set(k,v,false);return;}localStorage.setItem(k,v);}catch(e){}}
};
const KEY_R='sg_rounds_v1', KEY_C='sg_courses_v1', KEY_S='sg_settings_v1';

/* ============================================================================
   STATE + RENDER
============================================================================ */
let state={rounds:[],courses:[],benchmark:'scratch',view:'home',roundId:null,holeIdx:0,draft:null,courseId:null,editHole:0};
let _map=null,_markers={},_delConfirm=false;

async function load(){
  const r=await Store.get(KEY_R), c=await Store.get(KEY_C), s=await Store.get(KEY_S);
  state.rounds=r?JSON.parse(r):[]; state.courses=c?JSON.parse(c):[];
  if(s){ try{ const o=JSON.parse(s); if(o.benchmark) state.benchmark=o.benchmark; }catch(e){} }
  render();
}
async function saveRounds(){ await Store.set(KEY_R,JSON.stringify(state.rounds)); }
async function saveCourses(){ await Store.set(KEY_C,JSON.stringify(state.courses)); }
async function saveSettings(){ await Store.set(KEY_S,JSON.stringify({benchmark:state.benchmark})); }
function curRound(){ return state.rounds.find(r=>r.id===state.roundId); }
function curCourse(){ return state.courses.find(c=>c.id===state.courseId); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function fmtSG(v){ return (v>=0?'+':'')+v.toFixed(2); }
function sgClass(v){ return v>0.001?'gain':v<-0.001?'loss':'flat'; }
function escapeHtml(s){ return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function toast(msg){const t=document.getElementById('toast');t.innerHTML=`<div class="toast">${msg}</div>`;clearTimeout(window._tt);window._tt=setTimeout(()=>t.innerHTML='',2800);}
function ICON(n){const i={back:'<path d="M15 18l-6-6 6-6"/>',flag:'<path d="M4 22V4M4 4h13l-2 4 2 4H4"/>',target:'<circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3"/>',plus:'<path d="M12 5v14M5 12h14"/>',chev:'<path d="M9 18l6-6-6-6"/>',map:'<path d="M9 4L3 6v14l6-2 6 2 6-2V4l-6 2-6-2zM9 4v14M15 6v14"/>',chart:'<path d="M3 3v18h18M7 14l4-4 3 3 5-6"/>',download:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>',upload:'<path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>'};return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${i[n]}</svg>`;}
function destroyMap(){ if(_map){try{_map.remove();}catch(e){} _map=null; _markers={};} }
function benchToggle(){ return `<div class="seg" style="margin-bottom:0">${['tour','scratch'].map(b=>`<button aria-pressed="${state.benchmark===b}" onclick="setBenchmark('${b}')">vs ${BENCH_LABEL[b]}</button>`).join('')}</div>`; }
function setBenchmark(b){ state.benchmark=b; saveSettings(); render(); }

function render(){
  if(state.view!=='courseEdit') destroyMap();
  renderTop();
  ({home:viewHome,round:viewRound,hole:viewHole,courses:viewCourses,courseEdit:viewCourseEdit,profile:viewProfile}[state.view])();
}
function goView(v){ state.view=v; render(); }

function renderTop(){
  const tb=document.getElementById('topbar');
  if(state.view==='home'){
    tb.innerHTML=`<span class="brand">Stroke<b>·</b>Gained</span><span class="ctx">vs ${BENCH_LABEL[state.benchmark]}</span>`;

  }
}

/* ---------- GAME PROFILE ---------- */
function viewProfile(){
  const app=document.getElementById('app');
  const played=state.rounds.filter(r=>r.holes.some(h=>h.shots.length>0));
  if(played.length===0){
    app.innerHTML=`<div class="card"><p class="eyebrow">Game profile</p>
      <div class="empty">Log a round and your category handicaps appear here.</div></div>
      <button class="btn btn-ghost" onclick="goView('home')">Back</button>`;
    return;
  }
  const sum={ott:0,app:0,arg:0,putt:0}; let tot=0;
  played.forEach(r=>{ const t=roundTotals(r,'scratch'); ['ott','app','arg','putt'].forEach(c=>sum[c]+=t.cats[c]); tot+=t.total; });
  const n=played.length;
  const per={}; ['ott','app','arg','putt'].forEach(c=>per[c]=sum[c]/n);
  const overall=toHcp(tot/n,HCP_TOTAL_COEF);
  const order=['ott','app','arg','putt'];
  // rank to call out best & worst
  const hcps=order.map(c=>({c,h:toHcp(per[c],HCP_COEF[c])}));
  const best=[...hcps].sort((a,b)=>a.h-b.h)[0], worst=[...hcps].sort((a,b)=>b.h-a.h)[0];
  const rows=order.map(c=>{
    const h=toHcp(per[c],HCP_COEF[c]);
    const pct=Math.max(5,Math.min(100,(36-h)/44*100));
    return `<div class="prow">
      <div class="pinfo"><div class="pname">${CAT_NAMES[c]}</div>
        <div class="psg">${fmtSG(per[c])}/round</div></div>
      <div class="ptrack"><div class="pbar" style="width:${pct}%"></div></div>
      <div class="phcp">${fmtHcp(h)}</div></div>`;
  }).join('');
  app.innerHTML=`
    <div class="card">
      <div class="readout" style="margin:-2px -2px 14px">
        <div class="lbl">Game profile · ${n} round${n>1?'s':''}</div>
        <div class="big" style="font-size:40px">${hcpWord(overall)}</div>
        <div class="sub">shot-quality level vs scratch, by category</div>
      </div>
      ${rows}
      <p class="hint" style="margin-top:14px">Strength: <b>${CAT_NAMES[best.c].toLowerCase()}</b> (${fmtHcp(best.h)}). Biggest opportunity: <b>${CAT_NAMES[worst.c].toLowerCase()}</b> (${fmtHcp(worst.h)}).</p>
    </div>
    <div class="card">
      <p class="hint">Each row reads your average strokes gained vs a scratch golfer and maps it to the handicap that typically plays at that level. ${n<5?`<b>Only ${n} round${n>1?'s':''} so far — log a few more for a stable read.</b> `:''}It measures shot quality, not course-adjusted handicap, so it won't match your official number exactly.</p>
    </div>
    <button class="btn btn-ghost" onclick="goView('home')">Back</button>`;
}

/* ---------- COURSE EDIT (satellite map) ---------- */

function initMap(){
  const c=curCourse(); const el=document.getElementById('cmap'); if(!el||_map) return;
  _map=L.map(el,{zoomControl:true,attributionControl:false});
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{maxZoom:20,maxNativeZoom:19}).addTo(_map);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',{maxZoom:20,maxNativeZoom:19,opacity:.9}).addTo(_map);
  const pts=c.holes.filter(h=>h.green).map(h=>[h.green.lat,h.green.lng]);
  if(pts.length>1) _map.fitBounds(pts,{padding:[40,40]});
  else if(pts.length===1) _map.setView(pts[0],17);
  else _map.setView([-33.8688,151.2093],12);
  _markers={};
  c.holes.forEach((h,i)=>{ if(h.green) placeMarker(i,h.green); });
  _map.on('click',e=>setGreen(state.editHole,{lat:e.latlng.lat,lng:e.latlng.lng}));
  setTimeout(()=>_map.invalidateSize(),60);
}
function placeMarker(i,green){
  if(_markers[i]) _markers[i].setLatLng([green.lat,green.lng]);
  else _markers[i]=L.marker([green.lat,green.lng],{icon:L.divIcon({className:'',html:`<div class="greenmark">${i+1}</div>`,iconSize:[22,22],iconAnchor:[11,11]})}).addTo(_map);
}
function setGreen(i,green){
  const c=curCourse(); c.holes[i].green=green; saveCourses();
  if(_map) placeMarker(i,green);
  toast('Hole '+(i+1)+' green set');
  const next=c.holes.findIndex((h,idx)=>idx>i && !h.green);
  state.editHole = next!==-1 ? next : i;
  refreshHgrid(); refreshHolePanel();
}
function selectEditHole(i){ state.editHole=i; refreshHgrid(); refreshHolePanel();
  const g=curCourse().holes[i].green; if(g&&_map) _map.setView([g.lat,g.lng],Math.max(_map.getZoom(),17)); }
function refreshHgrid(){
  const c=curCourse(); const g=document.getElementById('hgrid'); if(!g) return;
  g.innerHTML=c.holes.map((h,i)=>`<button class="hbtn" data-set="${!!h.green}" aria-pressed="${state.editHole===i}" onclick="selectEditHole(${i})">${i+1}<span class="tick">${h.green?'●':'○'}</span></button>`).join('');
}
function refreshHolePanel(){
  const c=curCourse(); const i=state.editHole; const h=c.holes[i]; const p=document.getElementById('holePanel'); if(!p) return;
  const set=c.holes.filter(x=>x.green).length;
  p.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-weight:700;font-family:'Archivo'">Hole ${i+1} ${h.green?'· green set':'· tap the green'}</div>
      <div class="hint">${set}/${c.holes.length} set</div></div>
    <label class="fld">Par (set once)</label>
    <div class="seg">${[3,4,5].map(pp=>`<button aria-pressed="${h.par===pp}" onclick="setCoursePar(${pp})">Par ${pp}</button>`).join('')}</div>
    <label class="fld">Or paste coordinates (Google Maps: right-click → copy)</label>
    <div class="searchrow"><input type="text" id="c-coord" placeholder="-33.8901, 151.2100" value="${h.green?h.green.lat.toFixed(6)+', '+h.green.lng.toFixed(6):''}">
      <button class="btn btn-ghost btn-sm" style="width:auto" onclick="pasteCoord()">Set</button></div>
    ${h.green?`<button class="link" onclick="clearGreen()">Clear hole ${i+1}</button>`:''}`;
}
function setCoursePar(p){ curCourse().holes[state.editHole].par=p; saveCourses(); refreshHolePanel(); }
function pasteCoord(){
  const v=document.getElementById('c-coord').value.trim();
  const m=v.match(/(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)/);
  if(!m){ toast('Paste as: lat, lng'); return; }
  const lat=parseFloat(m[1]), lng=parseFloat(m[2]);
  if(Math.abs(lat)>90||Math.abs(lng)>180){ toast('Not valid coordinates'); return; }
  setGreen(state.editHole,{lat,lng});
  if(_map) _map.setView([lat,lng],17);
}
function clearGreen(){ curCourse().holes[state.editHole].green=null; saveCourses();
  if(_markers[state.editHole]){_map.removeLayer(_markers[state.editHole]);delete _markers[state.editHole];}

function searchPlace(){

/* ---------- ROUND ---------- */
function viewRound(){
  const r=curRound(); const app=document.getElementById('app'); const bm=state.benchmark; const tot=roundTotals(r,bm);
  const holes=r.holes.map((h,i)=>{
    const hsg=holeStrokesGained(h,bm).reduce((a,s)=>a+(s.sg||0),0); const played=h.shots.length>0;
    return `<div class="shot" onclick="openHole(${i})" style="cursor:pointer">
      <span class="n">${i+1}</span>
      <div class="meta"><div class="l1">Par ${h.par}</div><div class="l2">${played?h.shots.length+' shots':'not played'}</div></div>
      <span class="sg ${played?sgClass(hsg):'flat'}">${played?fmtSG(hsg):'—'}</span>
      <span style="color:var(--muted)">${ICON('chev')}</span></div>`;
  }).join('');
  app.innerHTML=`${summaryCard(r,tot)}
    <div class="card"><p class="eyebrow">Holes</p>${holes}</div>
    <button class="btn btn-ghost" onclick="goView('home')">Done — back to rounds</button>`;
}
function summaryCard(r,tot){
  const order=['ott','app','arg','putt'];
  const maxAbs=Math.max(0.5,...order.map(c=>Math.abs(tot.cats[c])));
  const bars=order.map(c=>{
    const v=tot.cats[c]; const pct=Math.min(50,Math.abs(v)/maxAbs*50);
    const side=v>=0?`left:50%;width:${pct}%`:`right:50%;width:${pct}%`;
    return `<div class="cat"><div class="top"><span class="name">${CAT_NAMES[c]}</span><span class="v ${sgClass(v)}">${fmtSG(v)}</span></div>
      <div class="track"><div class="mid"></div><div class="bar ${v>=0?'gain':'loss'}" style="${side}"></div></div></div>`;
  }).join('');
  return `<div class="card">
    <div class="readout" style="margin:-2px -2px 14px">
      <div class="lbl">Round · strokes gained vs ${BENCH_LABEL[state.benchmark]}</div>
      <div class="big ${sgClass(tot.total)}">${fmtSG(tot.total)}</div>
      <div class="sub">${escapeHtml(r.course||'Round')} · ${r.date}</div></div>
    <div style="margin-bottom:14px">${benchToggle()}</div>
    <p class="eyebrow">By category</p>${bars}
    <p class="hint" style="margin-top:12px">Positive = better than ${BENCH_LABEL[state.benchmark].toLowerCase()} from those spots. The biggest negative bar is where you're leaking the most strokes.</p></div>`;
}

/* ---------- ACTIONS ---------- */
function startRound(){
  const sel=document.getElementById('f-course').value;
  const date=document.getElementById('f-date').value||new Date().toISOString().slice(0,10);
  let course,holes;
  if(sel==='__manual'){
    const n=Math.max(1,Math.min(18,parseInt(document.getElementById('f-holes').value)||18));
    course='Round'; holes=[]; for(let k=0;k<n;k++) holes.push({par:4,shots:[],pin:null});
  }else{
    const c=state.courses.find(x=>x.id===sel); if(!c){toast('Pick a course');return;}
    course=c.name; holes=c.holes.map(h=>({par:h.par,shots:[],pin:h.green?{lat:h.green.lat,lng:h.green.lng}:null}));
  }
  const r={id:uid(),course,date,holes}; state.rounds.push(r); state.roundId=r.id; saveRounds(); openHole(0);
}
function openRound(id){ state.roundId=id; goView('round'); }
function openHole(i){ state.holeIdx=i; state.draft={lie:i===0?'tee':'fairway',dist:'',pen:0}; goView('hole'); }
function navHole(d){ const r=curRound(); const ni=state.holeIdx+d; if(ni<0||ni>=r.holes.length) return; openHole(ni); }
function setLie(l){ state.draft.lie=l; render(); }
function setPar(p){ curRound().holes[state.holeIdx].par=p; saveRounds(); render(); }
function penAdj(d){ state.draft.pen=Math.max(0,(state.draft.pen||0)+d); render(); }
function addShot(holed){
  const r=curRound(); const h=r.holes[state.holeIdx]; const d=state.draft;
  const distVal=d.dist===''||d.dist==null?null:parseFloat(d.dist);
  if(distVal==null||isNaN(distVal)){ toast('Enter the distance to the hole first'); return; }
  h.shots.push({lie:d.lie,dist:distVal,pen:d.pen||0}); window._pulse=true;
  if(holed){ state.draft={lie:'tee',dist:'',pen:0}; saveRounds();
    toast('Hole complete · '+fmtSG(holeStrokesGained(h,state.benchmark).reduce((a,s)=>a+s.sg,0))+' SG'); render();
  }else{ state.draft={lie:d.lie==='green'?'green':'fairway',dist:'',pen:0}; saveRounds(); render(); }
}
function delShot(idx){ curRound().holes[state.holeIdx].shots.splice(idx,1); saveRounds(); render(); }
async function measure(){
  const h=curRound().holes[state.holeIdx]; const d=state.draft;
  if(d.lie==='green'){ toast('On the green — pace your putt and enter it in feet'); return; }
  if(!GPS_OK){ toast('No GPS — type the distance instead'); return; }
  if(!h.pin){ toast('No green saved for this hole. Set the course up, or type it.'); return; }
  toast('Reading GPS…');
  try{
    const p=await getPosition();
    const m=haversineMeters({lat:p.lat,lng:p.lng},h.pin);
    const val=Math.round(m*1.09361);
    state.draft.dist=val; render();
    toast('Measured '+val+' yd to green centre (±'+Math.round(p.acc)+'m)');
  }catch(e){ toast(gpsErr(e)); }
}

/* ---------- EXPORT / IMPORT ---------- */
async function exportData(){
  const [r,c,s]=await Promise.all([Store.get(KEY_R),Store.get(KEY_C),Store.get(KEY_S)]);
  const payload={_v:1,
    rounds:r?JSON.parse(r):[],
    courses:c?JSON.parse(c):[],
    settings:s?JSON.parse(s):{}};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='strokes-gained-backup-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Backup downloaded');
}
function triggerImport(){ document.getElementById('import-file').click(); }
async function importData(file){
  let data;
  try{ const text=await file.text(); data=JSON.parse(text); }
  catch(e){ toast('Bad JSON — file not recognised, no data was changed'); return; }
  if(!data||typeof data!=='object'||!Array.isArray(data.rounds)||!Array.isArray(data.courses)){
    toast('Wrong format — expected a strokes-gained backup file'); return; }
  const validRound=r=>r&&typeof r.id==='string'&&Array.isArray(r.holes);
  const validCourse=c=>c&&typeof c.id==='string'&&Array.isArray(c.holes);
  if(!data.rounds.every(validRound)||!data.courses.every(validCourse)){
    toast('File contains invalid records — no data was changed'); return; }
  data.rounds.forEach(inc=>{
    const idx=state.rounds.findIndex(r=>r.id===inc.id);
    if(idx===-1) state.rounds.push(inc); else state.rounds[idx]=inc;
  });
  data.courses.forEach(inc=>{
    const idx=state.courses.findIndex(c=>c.id===inc.id);
    if(idx===-1) state.courses.push(inc); else state.courses[idx]=inc;
  });
  if(data.settings&&['tour','scratch'].includes(data.settings.benchmark)){
    state.benchmark=data.settings.benchmark; await saveSettings(); }
  await saveRounds(); await saveCourses(); render();
  const parts=[];
  if(data.rounds.length) parts.push(data.rounds.length+' round'+(data.rounds.length!==1?'s':''));
  if(data.courses.length) parts.push(data.courses.length+' course'+(data.courses.length!==1?'s':''));
  toast('Imported '+(parts.join(', ')||'nothing new'));
}
document.getElementById('import-file').addEventListener('change',function(e){
  const file=e.target.files[0]; if(file) importData(file); this.value='';
});

load();
</script>
